<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FireGuard</title>
    <style>
        body {
            margin: 0;
            display: flex;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        #panel {
            width: 100%;
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
            background-color: white;
        }
        button {
            display: inline-block;
            font-size: 18;
            padding: 12px 24px;
            margin: px;
            border-radius: 8px;
            border: none;
            background-color:beige;
            color:black;
        }
        button:hover {
            background-color:bisque;
            transform: scale(1.05);
        }
        button:focus {
            outline: 2px solid bisque;
            outline-offset: 2px;
        }

    </style>
</head>
<body>
    <div id="panel">
        <img src="{{ url_for('static', filename='FireGuardLogo.jpg') }}" alt="FireGuardLogo" style="width: 400px;"><br>
        
        <div id="message" style="margin-top: 10px; font-weight: bold;"></div>

        <button onclick="window.location.href='/login'">Log in with key cloak</button><p></p>

        <form id="guestForm" onsubmit="event.preventDefault(); continueWithoutLogin();">
            <button type="submit" style="margin-top: 10px;">Continue as Guest</button>
        </form>

        <script>
            function continueWithoutLogin() {
                fetch('/set-guest', {method: 'POST'}).then(response => { if(response.ok) { window.location.href = '/mainpage';} else {alert('Something went wrong');}})
            };
        </script>

    </div>
    <div id="map">

    </div>
</body>
</html>
