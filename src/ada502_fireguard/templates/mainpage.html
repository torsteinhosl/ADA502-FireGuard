<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>FireGuard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            margin: 0;
            display: flex;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        #panel {
            width: 50%;
            padding: 20px;
            box-sizing: border-box;
            background-color: white;
        }

        #map {
            width: 50%;
            height: 100%
        }
        
        button {
            padding: 10px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background-color: #45a049;
        }

        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

    <div id="panel">
        <div style="top:20px; right:20px;">
            Logged in as: {{username}}
            <button onclick="window.location.href='/logout'">Log out</button>
        </div>
        Favorites:
        <select id="favorites" onchange="loadFavorite()">
            <option value="" disabled selected hidden></option>
            {% for place in favorites %}
            <option data-lat="{{place.lat}}"
                    data-long="{{place.long}}">
                {{place.name}}
            </option>
            {%endfor%}
        </select>

        <h2>Search
            <input type="text" id="search" placeholder="" onkeyup="searchPlaces()"><ul id="searchResults"></ul></input>
            <button onclick="addFavorite()">Add to favorites</button>
        </h2>
        <div id="weatherBox">
            <p>Click the map to see weather</p>
        </div>
        <!-- GPT-kode. Knappen sender emails så vi ikke må vente til kl 00-->
        <div style="margin-top: 30px; border-top: 1px solid #ccc; padding-top: 20px;">
            <h3>Testing</h3>
            <button id="triggerTaskBtn" onclick="triggerDailyTask()">
                Trigger Daily Task (Test)
            </button>
            <p id="taskStatus" style="margin-top: 10px; font-size: 14px;"></p>
        </div>
        <script>
            let places = {{places | tojson}};

            function addFavorite() {
                if(!currentTettsted) {
                    alert("Select a place first!")
                    return
                }
                fetch(`/favorite`, {method:"POST", credentials: "include"}) <!-- ${encodeURIComponent(currentTettsted)}/${encodeURIComponent(currentKommune)}/${encodeURIComponent(currentFylke)}-->
                    .then(()=>{alert("Added to favorites")})
            }

            function searchPlaces(){
                let input = document.getElementById("search").value.toLowerCase()
                let results = document.getElementById("searchResults")

                results.innerHTML = ""

                if(input.length == 0) return

                places.forEach(place=> {
                    if(place.name.toLowerCase().includes(input)) {
                        let li = document.createElement("li")
                        li.innerText = place.name
                        li.onclick = function() {
                            getWeather(place.lat, place.long)
                            results.innerHTML = ""
                        }
                        results.appendChild(li)
                    }
                })
            }

            function loadFavorite(){
                let select = document.getElementById("favorites")
                let option = select.options[select.selectedIndex]
                if(!option.dataset.lat) return

                getWeather(option.dataset.lat, option.dataset.long)
            }
        </script>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
        // GPT-kode. Sender emails
        function triggerDailyTask() {
            const btn = document.getElementById("triggerTaskBtn");
            const status = document.getElementById("taskStatus");

            btn.disabled = true;
            status.innerHTML = "Running...";
            status.style.color = "blue";

            fetch('/trigger-daily-task', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                }
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        status.innerHTML = "✓ Task executed successfully!";
                        status.style.color = "green";
                    } else {
                        status.innerHTML = "✗ Error: " + data.message;
                        status.style.color = "red";
                    }
                    btn.disabled = false;
                })
                .catch(error => {
                    status.innerHTML = "✗ Network error: " + error;
                    status.style.color = "red";
                    btn.disabled = false;
                });
        }

        var map = L.map('map').setView([65.418873, 15.668229], 5);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: 'OpenStreetMap contributors' }).addTo(map);

        var norwayBounds = L.latLngBounds(
            [53.3, 2.5],   // Southwest
            [72.0, 33.0]   // Northeast
        );

        map.setMaxBounds(norwayBounds);

        var currentMarker = null;
        let currentTettsted = null;
        let currentKommune = null;
        let currentFylke = null;

        function getWeather(lat, lon) {
            fetch(`/weather?lat=${lat}&lon=${lon}`)
                .then(response => response.json())
                .then(data => {

                    if (data.error) {
                        document.getElementById("weatherBox").innerHTML =
                            "<p style='color:red;'>Error loading weather</p>";
                        return;
                    }
                    currentTettsted = data.place
                    currentKommune = data.municipality
                    currentFylke = data.county

                    document.getElementById("weatherBox").innerHTML = `
                    <h3>Weather Data for ${data.place},${data.municipality}</h3>
                    <p><strong>Temperature:</strong> ${data.temperature} °C</p>
                    <p><strong>Wind Speed:</strong> ${data.wind_speed} m/s</p>
                    <p><strong>Humidity:</strong> ${data.humidity} %</p>
                    <p><strong>Timestamp:</strong> ${data.timestamp} </p>
                    <p><strong>Time to flashover:</strong> ${data.ttf_current} min</p>
                    <p><strong>Future time to flashover:</strong> <span style="color: darkred;">(make this pretty later)</span> <br> ${data.ttf_future}</p>
                `;
                })
                .catch(error => {
                    console.error("Weather fetch error:", error);
                });
        }

        map.on("click", function (e) {

            const lat = e.latlng.lat;
            const lon = e.latlng.lng;

            if (currentMarker !== null) {
                map.removeLayer(currentMarker);
            }

            currentMarker = L.marker([lat, lon]).addTo(map);

            getWeather(lat, lon);
        });
    </script>
</body>

</html>
