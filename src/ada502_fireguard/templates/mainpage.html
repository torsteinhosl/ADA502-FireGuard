<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>FireGuard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            margin: 0;
            display: flex;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        #panel {
            width: 50%;
            padding: 20px;
            box-sizing: border-box;
            background-color: white;
        }

        #map {
            width: 50%;
            height: 100%
        }

        #searchResults {
            list-style: none;
            padding: 0;
            margin-top: 5px;
        }

        #searchResults li {
            padding: 5px;
            cursor: pointer;
        }

        #searchResults li:hover {
            background-color: #eee;
        }

        #forecastModules button {
            margin: 4px;
            padding: 8px;
            border-radius: 6px;
            border: none;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
        }

        #forecastDetails div {
            border: 1px solid #ccc;
            margin: 6px 0;
            padding: 8px;
        }

        button {
            padding: 5px 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background-color: #45a049;
        }

        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }

        .weather-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            text-align: center;
            padding: 10px;

        }
    </style>
</head>

<body>

    <div id="panel">
        <div style="top:10px; right:10px;">
            Logged in as: {{username}}
            <button onclick="window.location.href='/logout'">Log out</button>
        </div>

        <h2>Search
            <input type="text" id="search" placeholder="" onkeyup="searchPlaces()">
            Favorites:
            <select id="favorites" onchange="loadFavorite()">
                <option value="" disabled selected hidden></option>
                {% for place in favorites %}
                <option data-lat="{{place.latitude}}" data-long="{{place.longitude}}">
                    {{place.name}}
                </option>
                {%endfor%}
            </select>
            <button id="favoriteBtn" onclick="toggleFavorite()">Add to favorites</button>
            <ul id="searchResults"></ul></input>
        </h2>
        <div id="weatherBox">
            <p>Click the map to see weather</p>
        </div>
        <div id="forecastModules"></div>
        <div id="forecastDetails"></div>
        <!-- GPT-kode. Knappen sender emails så vi ikke må vente til kl 00-->
        <div style="margin-top: 30px; border-top: 1px solid #ccc; padding-top: 20px;">
            <h3>Testing</h3>
            <button id="triggerTaskBtn" onclick="triggerDailyTask()">
                Trigger Daily Task (Test)
            </button>
            <p id="taskStatus" style="margin-top: 10px; font-size: 14px;"></p> -->

            <button id="submitPlace" onclick="submitNewPlace()">
                Submit place
            </button>
            <button id="saveWeatherToday" onclick="saveNewDay()">Save the day!</button>
        </div>
        <script>
            let places = {{ places | tojson}};

            function toggleFavorite() {
                if (!currentTettsted) {
                    alert("Select a place first!")
                    return
                }
                let btn = document.getElementById("favoriteBtn")

                if (btn.innerText == "Remove from favorites") {
                    removeFavorite()
                } else {
                    addFavorite()
                }
            }

            function saveNewDay() {
                fetch(`/save_the_day`)
                alert("saved the day!")
            }

            function addFavorite() {
                fetch(`/favorite`, {
                    method: "POST", credentials: "include", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        tettsted: currentTettsted,
                        kommune: currentKommune,
                        fylke: currentFylke,
                        lat: latitude,
                        long: longitude
                    })
                }).then(res => res.json())
                    .then(response => {
                        if (!response.ok) throw new Error("failed");

                        let select = document.getElementById("favorites")
                        let option = document.createElement("option")

                        option.text = currentTettsted
                        option.dataset.lat = latitude
                        option.dataset.long = longitude

                        select.appendChild(option)
                        select.value = option.value

                        document.getElementById("favoriteBtn").innerText = "Remove from favorites"
                    })
                alert("Added to favorites")
            }

            function removeFavorite() {
                fetch(`/unfavorite`, {
                    method: "POST", credentials: "include", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        tettsted: currentTettsted,
                        kommune: currentKommune,
                        fylke: currentFylke,
                        lat: latitude,
                        long: longitude
                    })
                }).then(() => {
                    let select = document.getElementById("favorites")
                    for (let option of select.options) {
                        if (option.text === currentTettsted) {
                            select.removeChild(option)
                            break
                        }
                    }
                })
                document.getElementById("favoriteBtn").innerText = "Add to favorites"
                alert("Removed from favorites")
            }

            function loadFavorite() {
                let select = document.getElementById("favorites")
                let option = select.options[select.selectedIndex]
                if (!option.dataset.lat) return

                map.setView([option.dataset.lat, option.dataset.long], 10)
                if (currentMarker !== null) {
                    map.removeLayer(currentMarker);
                }
                currentMarker = L.marker([option.dataset.lat, option.dataset.long]).addTo(map);

                getWeather(option.dataset.lat, option.dataset.long)
            }

            function searchPlaces() {
                let input = document.getElementById("search").value.toLowerCase()
                let results = document.getElementById("searchResults")

                results.innerHTML = ""

                if (input.length == 0) return
                let count = 0

                for (let place of places) {
                    if (place.name.toLowerCase().includes(input)) {
                        let li = document.createElement("li")
                        li.innerText = place.name + ", " + place.kommune

                        li.onclick = function () {
                            getWeather(place.lat, place.long)
                            results.innerHTML = ""
                            map.setView([place.lat, place.long], 10)
                            if (currentMarker !== null) {
                                map.removeLayer(currentMarker);
                            }
                            currentMarker = L.marker([place.lat, place.long]).addTo(map);
                        }

                        results.appendChild(li)

                        count++
                        if (count >= 5) break
                    }
                }

            }

            function submitNewPlace() {
                fetch("/nytt-sted", {
                    method: "POST", headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        tettsted: currentTettsted,
                        kommune: currentKommune,
                        fylke: currentFylke,
                        lat: latitude,
                        long: longitude
                    })
                })
            }
        </script>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
        // GPT-kode. Brukes til å teste. Sender email når knappen trykkes på.

        var map = L.map('map').setView([65.418873, 15.668229], 5);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: 'OpenStreetMap contributors' }).addTo(map);

        var norwayBounds = L.latLngBounds(
            [53.3, 2.5],   // Southwest
            [72.0, 33.0]   // Northeast
        );

        map.setMaxBounds(norwayBounds);

        var currentMarker = null;
        let currentTettsted = null;
        let currentKommune = null;
        let currentFylke = null;
        let latitude = null;
        let longitude = null;

        function getWeather(lat, lon) {
            latitude = lat
            longitude = lon
            fetch(`/weather?lat=${lat}&lon=${lon}`)
                .then(response => response.json())
                .then(data => {

                    if (data.error) {
                        document.getElementById("weatherBox").innerHTML =
                            "<p style='color:red;'>Error loading weather</p>";
                        return;
                    }
                    currentTettsted = data.place
                    currentKommune = data.municipality
                    currentFylke = data.county

                    let btn = document.getElementById("favoriteBtn")
                    let isFavorite = false

                    document.querySelectorAll("#favorites option").forEach(option => {
                        if (option.text.trim() === currentTettsted.trim()) {
                            isFavorite = true
                        }
                    })

                    if (isFavorite) {
                        btn.innerText = "Remove from favorites"
                    } else {
                        btn.innerText = "Add to favorites"
                    }

                    document.getElementById("weatherBox").innerHTML = `
                    <h3>Current weather at ${data.place}, ${data.municipality}
                        <select id="historyDates" onchange="loadHistoryDay()">
                            <option value="" disabled selected hidden>Historic data</option>
                        <select>
                    </h3>
                    <div class="weather-grid">
                        <div><strong>Temperature</strong></div>
                        <div><strong>Wind Speed</strong></div>
                        <div><strong>Humidity</strong></div>
                        <div><strong>Time to flashover</strong></div>

                        <div>${data.temperature} °C</div>
                        <div>${data.wind_speed}m/s</div>
                        <div>${data.humidity}%</div>
                        <div>${data.ttf_current} min</div>
                    </div>
                    `
                    renderForecast(data.forecast)
                    loadHistoryDates(lat, lon)
                })
                .catch(error => {
                    console.error("Weather fetch error:", error);
                });
        }

        function loadHistoryDates(lat, lon) {
            fetch(`/history_dates?lat=${lat}&lon=${lon}`)
                .then(r => r.json())
                .then(data => {
                    let select = document.getElementById("historyDates")
                    select.innerHTML = '<option value="" disabled selected hidden>Historic data</option>'

                    data.forEach(row => {
                        let option = document.createElement("option")
                        option.text = row.date
                        option.dataset.temp = row.temp
                        option.dataset.wind = row.winr
                        option.dataset.humidity = row.humidity
                        option.dataset.firerisk = row.firerisk

                        select.appendChild(option)
                    })
                })
        }

        function loadHistoryDay() {
            let select = document.getElementById("historyDates")
            let option = select.selectedOptions[0]

            document.getElementById("temperature").innerText = option.dataset.temp
            document.getElementById("wind").innerText = option.dataset.wind
            document.getElementById("humidity").innerText = option.dataset.humidity
            document.getElementById("firerisk").innerText = option.dataset.firerisk
        }

        function renderForecast(forecast) {
            let modules = document.getElementById("forecastModules")
            modules.innerHTML = ""

            // Get today's date in YYYY-MM-DD format
            let today = new Date()
            let todayString = today.getFullYear() + "-" +
                String(today.getMonth() + 1).padStart(2, "0") + "-" +
                String(today.getDate()).padStart(2, "0")

            let days = {}

            forecast.forEach(entry => {
                let date = entry.time.split("T")[0]
                // Only include entries from today onwards
                if (date >= todayString) {
                    if (!days[date]) days[date] = []
                    days[date].push(entry)
                }
            })
            // Show today and the next 3 days (4 days total)
            Object.keys(days).slice(0, 4).forEach(date => {
                let btn = document.createElement("button")
                let d = new Date(date)
                btn.innerText = d.toLocaleDateString("nb-NO", {
                    weekday: "short",
                    day: "numeric",
                    month: "short"
                })
                btn.onclick = () => showDay(days[date])
                modules.appendChild(btn)
            })
        }

        function showDay(entries) {
            let container = document.getElementById("forecastDetails")
            container.innerHTML = ""

            entries.forEach(entry => {
                let date = new Date(entry.time)
                //Because of timezones the values are two hours of. This is a simple but bad fix
                if ((date.getHours() - 2) % 6 !== 0) return
                let div = document.createElement("div")

                //Because of timezones the values are two hours of. This is a simple but bad fix
                div.innerHTML = `
                <b>${date.getHours() - 2}:00</b><br>
                Temp: ${entry.temperature} °C <br>
                Wind: ${entry.wind_speed} m/s<br>
                Humidity: ${entry.humidity}% <br>
                Time to flashover: ${entry.ttf} min
                `
                container.appendChild(div)
            })
        }

        map.on("click", function (e) {

            const lat = e.latlng.lat;
            const lon = e.latlng.lng;

            if (currentMarker !== null) {
                map.removeLayer(currentMarker);
            }

            currentMarker = L.marker([lat, lon]).addTo(map);

            getWeather(lat, lon);
        });
    </script>
</body>

</html>
